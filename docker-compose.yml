services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cti-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: cti-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    # Start serve in background, wait until ready, pull the model, then keep running.
    # $$VAR escapes the $ so docker-compose passes $VAR through to the shell.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /usr/bin/ollama serve &
        SERVER_PID=$$!
        until /usr/bin/ollama list >/dev/null 2>&1; do sleep 2; done
        echo "Pulling model: ${OLLAMA_MODEL:-qwen2.5:3b}"
        /usr/bin/ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} || echo "Model already cached or pull failed — continuing"
        wait $$SERVER_PID
    healthcheck:
      test: ["CMD", "/usr/bin/ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build: .
    container_name: cti-backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - HALLUCINATION_SCORING=${HALLUCINATION_SCORING:-false}
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - ./chunks:/app/chunks
      - ./mlops:/app/mlops

  prometheus:
    image: prom/prometheus:latest
    container_name: cti-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: cti-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: cti-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

volumes:
  qdrant_data:
  ollama_data:
  grafana_data:
  mlflow_data:
  prometheus_data:
